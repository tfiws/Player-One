<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="./stylesheets/stylesheet.css">
    <script defer src="auth-state.js"></script>
</head>
<body>
    
    <nav>
        <div class="navbar">
            <a href="./index.html">
                <img src="./assets/logowords2.png" alt="Player One Logo" class="logo">
            </a>
            <div class="navbar-links">
                <a href="./index.html"> <button id="home-btn" class="btn nav-btn" > Home </button> </a>
                <a href="./games-library.html"> <button id="library-btn" class="btn nav-btn" > Library </button> </a>
                <form class="search-form" method="get" action="./games-library.html">
                    <input type="text" name="search" id="search-input" placeholder="Search games...">
                    <button type="submit" id="search-btn" class="btn nav-btn" > Search </button>
                </form>
                <div id="auth-button">
                    <a href="./signin.html"> <button id="signin-btn" class="btn nav-btn" > Sign In </button> </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="sign-in">
            <img src="./assets/transparent-solo-logo.png" alt="small logo for signin" class="small-logo">
            <h2 class="title">Sign In</h2>
            <p class="text">Access the Game Wiki Dashboard</p>
            <form class="form">
                <p class="email label">Email</p>
                <input type="email" id="email-input" class="input" placeholder="Email...">
                <p class="password label">Password</p>
                <input type="password" id="password-input" class="input" placeholder="Password...">
                <button type="button" class="btn signin-btn">Sign In</button>
                <a href="./signup.html" class="no-account">
                    <p>Dont have an account?</p>
                    <p>Click here to signup</p>
                </a>
            </form>
        </div>
    </div>

    <script>
        const signinBtn = document.querySelector('.signin-btn');
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');

        // Function to handle sign in
        const handleSignin = async (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;

            // Validate email and password
            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }

            // Validate email format
            if (!email.includes('@')) {
                alert('Please enter a valid email address (must contain @)');
                return;
            }

            // Call backend API to authenticate
            try {
                const response = await fetch('/auth/signin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                let data;
                try {
                    data = await response.json();
                } catch (parseError) {
                    console.error('Response parse error:', parseError, 'Response status:', response.status);
                    alert('Server error: Invalid response from server');
                    return;
                }

                if (response.ok) {
                    localStorage.setItem('loggedIn', 'true');
                    localStorage.setItem('userEmail', email);
                    alert('Signed in successfully!');
                    window.location.href = 'index.html';
                } else {
                    alert(data.error || 'Sign in failed');
                }
            } catch (error) {
                console.error('Signin error:', error);
                alert('Error signing in: ' + error.message);
            }
        };

        // Click event listener for the button
        signinBtn.addEventListener('click', handleSignin);

        // Enter key press for input fields
        emailInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSignin(e);
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSignin(e);
            }
        });
    </script>

</body>
</html>
