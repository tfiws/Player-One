<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="./stylesheets/stylesheet.css">
</head>
<body>
    <div class="navbar">
        <a href="./index.html">
            <img src="./assets/logowords2.png" alt="Player One Logo" class="logo">
        </a>
        <div class="navbar-links">
            <a href="./index.html"> <button id="home-btn" class="btn nav-btn" > Home </button> </a>
            <a href="./pages/about.html"> <button id="about-btn" class="btn nav-btn" > About </button> </a>
            <form class="search-form"> 
                <input type="text" id="search-input" placeholder="Search games...">
                <button id="search-btn" class="btn nav-btn" > Search </button> 
            </form>
            <a href=""> <button id="signin-btn" class="btn nav-btn" > Sign In </button> </a>
        </div>
    </div> 

    <div class="container">
        <div class="sign-in">
            <img src="./assets/transparent-solo-logo.png" alt="small logo for signin" class="small-logo">
            <h2 class="title">Sign In</h2>
            <p class="text">Access the Game Wiki Dashboard</p>
            <form class="form">
                <p class="email label">Email</p>
                <input type="text" id="email-input" class="input" placeholder="Email...">
                <p class="password label">Password</p>
                <input type="text" id="password-input" class="input" placeholder="Password...">
                <button class="btn signin-btn">Sign In</button>
                <a href="./signup.html" class="no-account">
                    <p>Dont have an account?</p>
                    <p>Click here to signup</p>
                </a>
            </form>
        </div>
    </div>


</body>
</html>
