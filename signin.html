<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="./stylesheets/stylesheet.css">
</head>
<body>
    <div class="navbar">
        <a href="./index.html">
            <img src="./assets/logowords2.png" alt="Player One Logo" class="logo">
        </a>
        <div class="navbar-links">
            <a href="./index.html"> <button id="home-btn" class="btn nav-btn" > Home </button> </a>
            <a href="./games-library.html"> <button id="library-btn" class="btn nav-btn" > Library </button> </a>
            <form class="search-form"> 
                <input type="text" id="search-input" placeholder="Search games...">
                <button id="search-btn" class="btn nav-btn" > Search </button> 
            </form>
            <div id="auth-button">
                <a href="./signin.html"> <button id="signin-btn" class="btn nav-btn" > Sign In </button> </a>
            </div>
        </div>
    </div> 

    <div class="container">
        <div class="sign-in">
            <img src="./assets/transparent-solo-logo.png" alt="small logo for signin" class="small-logo">
            <h2 class="title">Sign In</h2>
            <p class="text">Access the Game Wiki Dashboard</p>
            <form class="form">
                <p class="email label">Email</p>
                <input type="email" id="email-input" class="input" placeholder="Email...">
                <p class="password label">Password</p>
                <input type="password" id="password-input" class="input" placeholder="Password...">
                <button type="button" class="btn signin-btn">Sign In</button>
                <a href="./signup.html" class="no-account">
                    <p>Dont have an account?</p>
                    <p>Click here to signup</p>
                </a>
            </form>
        </div>
    </div>

    <script>
        document.querySelector('.signin-btn').addEventListener('click', (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;

            // Mock authentication - in real app this would be server-side
            if (email && password) {
                localStorage.setItem('loggedIn', 'true');
                localStorage.setItem('userEmail', email);
                alert('Signed in successfully!');
                window.location.href = 'index.html';
            } else {
                alert('Please enter email and password');
            }
        });

        function updateAuthButton(loggedIn) {
            const authDiv = document.getElementById('auth-button');
            if (loggedIn) {
                authDiv.innerHTML = '<button id="logout-btn" class="btn nav-btn">Log Out</button>';
                document.getElementById('logout-btn').addEventListener('click', () => {
                    localStorage.removeItem('loggedIn');
                    localStorage.removeItem('userEmail');
                    location.reload();
                });
            } else {
                authDiv.innerHTML = '<a href="./signin.html"> <button id="signin-btn" class="btn nav-btn" > Sign In </button> </a>';
            }
        }

        // Check login status on page load
        const loggedIn = localStorage.getItem('loggedIn') === 'true';
        updateAuthButton(loggedIn);
    </script>

</body>
</html>
