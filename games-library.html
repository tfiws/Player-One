<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library</title>
    <link rel="stylesheet" href="stylesheets/stylesheet.css">
</head>
<body>
    <nav>
        <div class="navbar">
            <a href="./index.html">
                <img src="./assets/logowords2.png" alt="Player One Logo" class="logo">
            </a>
            <div class="navbar-links">
                <a href="./index.html"> <button id="home-btn" class="btn nav-btn" > Home </button> </a>
                <a href="./games-library.html"> <button id="library-btn" class="btn nav-btn" > Library </button> </a>
                <form class="search-form" method="get" action="./games-library.html">
                    <input type="text" name="search" id="search-input" placeholder="Search games...">
                    <button type="submit" id="search-btn" class="btn nav-btn" > Search </button>
                </form>
                <div id="auth-button">
                    <a href="signin.html"> <button id="signin-btn" class="btn nav-btn" > Sign In </button> </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="gamelibrary-wrapper">
        <div class="librarytitle-wrapper">
            <div class="library title">
                <h1>Game Library</h1>
                <p>Browse and discover detailed wiki pages for your favorite games</p>
        </div>
        <div class="searchoptions-wrapper">
            <form method="get" action="" class="library-search"><input name="search" type="text" id="library-search-input" placeholder="Search games..."><button type="submit" id="library-search-btn" class="btn">Search</button></form>
            <div class="dropdown-wrapper">
                <form action="" class="dropdown">
                    <select name="genres" id="genres" class="genre">
                        <option value="All">All Genres</option>
                        <option value="RPG">RPG</option>
                        <option value="Action">Action</option>
                    </select>
                </form>
                <form action="" class="dropdown">
                    <select name="platforms" id="platforms" class="platforms">
                        <option value="All">All Platforms</option>
                        <option value="PC">PC</option>
                        <option value="PlayStation">PlayStation</option>
                        <option value="Xbox">Xbox</option>
                        <option value="Nintendo">Nintendo</option>
                    </select>
                </form>
            </div>
        </div>
        <div id="games-list">
            <!-- Games will be loaded here -->
        </div>

    </div>

    <script>
        async function loadGames(search = '', genre = 'All', platform = 'All') {
            // Mock games data
            const allGames = [
                {
                    title: 'Elden Ring',
                    genre: 'Open-world RPG',
                    platform: 'PC, PlayStation, Xbox',
                    description: 'An action RPG set in the Lands Between, a realm blessed by the Greater Will and the Erdtree.',
                    release_year: 2022,
                    image_url: './assets/eldenring.webp',
                    page_url: './elden-ring.html'
                },
                {
                    title: 'Cyberpunk 2077',
                    genre: 'Action RPG',
                    platform: 'PC, PlayStation, Xbox',
                    description: 'An open-world action-adventure RPG set in Night City, a megalopolis obsessed with power, glamour and body modification.',
                    release_year: 2020,
                    image_url: './assets/cyberpunk2077.jpeg',
                    page_url: './cyberpunk2077.html'
                },
                {
                    title: 'The Legend of Zelda: Tears of the Kingdom',
                    genre: 'Action-Adventure',
                    platform: 'Nintendo Switch',
                    description: 'The sequel to The Legend of Zelda: Breath of the Wild, featuring new abilities to explore the skies above and then depths below Hyrule.',
                    release_year: 2023,
                    image_url: './assets/tears-of-the-kingdom.webp',
                    page_url: './tears-of-the-kingdom.html'
                }
            ];

            let games = allGames;

            if (search) {
                games = games.filter(game => game.title.toLowerCase().includes(search.toLowerCase()));
            }

            if (genre !== 'All') {
                games = games.filter(game => game.genre.toLowerCase().includes(genre.toLowerCase()));
            }

            if (platform !== 'All') {
                games = games.filter(game => game.platform.toLowerCase().includes(platform.toLowerCase()));
            }

            const list = document.getElementById('games-list');
            list.innerHTML = games.map(game => `
                <div class="game-card">
                    <a href="${game.page_url}">
                        <img src="${game.image_url}" alt="${game.title}" class="game-image">
                        <div class="info">
                            <h3 class="game title">${game.title}</h3>
                            <p class="tag genre-tag">${game.genre}</p>
                            <p class="game description">${game.description}</p>
                            <p class="release-date">${game.release_year}</p>
                        </div>
                    </a>
                </div>
            `).join('');
        }

        // Initial load
        const urlParams = new URLSearchParams(window.location.search);
        const searchParam = urlParams.get('search') || '';
        document.getElementById('library-search-input').value = searchParam;
        loadGames(searchParam);

        // Event listeners
        document.getElementById('library-search-input').addEventListener('input', (e) => {
            const search = e.target.value;
            const genre = document.getElementById('genres').value;
            const platform = document.getElementById('platforms').value;
            loadGames(search, genre, platform);
        });

        document.getElementById('genres').addEventListener('change', (e) => {
            const search = document.getElementById('library-search-input').value;
            const genre = e.target.value;
            const platform = document.getElementById('platforms').value;
            loadGames(search, genre, platform);
        });

        document.getElementById('platforms').addEventListener('change', (e) => {
            const search = document.getElementById('library-search-input').value;
            const genre = document.getElementById('genres').value;
            const platform = e.target.value;
            loadGames(search, genre, platform);
        });

        function updateAuthButton(loggedIn) {
            const authDiv = document.getElementById('auth-button');
            if (loggedIn) {
                authDiv.innerHTML = '<button id="logout-btn" class="btn nav-btn">Log Out</button>';
                document.getElementById('logout-btn').addEventListener('click', () => {
                    localStorage.removeItem('loggedIn');
                    localStorage.removeItem('userEmail');
                    location.reload();
                });
            } else {
                authDiv.innerHTML = '<a href="signin.html"> <button id="signin-btn" class="btn nav-btn" > Sign In </button> </a>';
            }
        }

        // Check login status on page load
        const loggedIn = localStorage.getItem('loggedIn') === 'true';
        updateAuthButton(loggedIn);
    </script>

</body>
</html>
