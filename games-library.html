<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library</title>
    <link rel="stylesheet" href="stylesheets/stylesheet.css">
</head>
<body>
    <div class="navbar">
        <a href="./index.html">
            <img src="./assets/logowords2.png" alt="Player One Logo" class="logo">
        </a>
        <div class="navbar-links">
            <a href="./index.html"> <button id="home-btn" class="btn nav-btn" > Home </button> </a>
            <a href="./games-library.html"> <button id="library-btn" class="btn nav-btn" > Library </button> </a>
            <form class="search-form"> 
                <input type="text" id="search-input" placeholder="Search games...">
                <button id="search-btn" class="btn nav-btn" > Search </button> 
            </form>
            <div id="auth-button">
                <a href="signin.html"> <button id="signin-btn" class="btn nav-btn" > Sign In </button> </a>
            </div>
        </div>
    </div>

    <div class="gamelibrary-wrapper">
        <div class="librarytitle-wrapper">
            <div class="library title">
                <h1>Game Library</h1>
                <p>Browse and discover detailed wiki pages for your favorite games</p>
        </div>
        <div class="searchoptions-wrapper">
            <form action="" class="library-search"><input type="text" id="library-search-input" placeholder="Search games..."></form>
            <div class="dropdown-wrapper">
                <form action="" class="dropdown">
                    <select name="genres" id="genres" class="genre">
                        <option value="All">All Genres</option>
                        <option value="RPG">RPG</option>
                        <option value="Action">Action</option>
                    </select>
                </form>
                <form action="" class="dropdown">
                    <select name="platforms" id="platforms" class="platforms">
                        <option value="All">All Platforms</option>
                        <option value="PC">PC</option>
                        <option value="PlayStation">PlayStation</option>
                        <option value="Xbox">Xbox</option>
                        <option value="Nintendo">Nintendo</option>
                    </select>
                </form>
            </div>
        </div>
        <div id="games-list">
            <!-- Games will be loaded here -->
        </div>

    </div>

    <script>
        async function loadGames(search = '', genre = 'All', platform = 'All') {
            try {
                const params = new URLSearchParams({ search, genre, platform });
                const response = await fetch(`/games?${params}`);
                const games = await response.json();
                const list = document.getElementById('games-list');
                list.innerHTML = games.map(game => `
                    <div class="game-card">
                        <a href="${game.page_url}">
                            <img src="${game.image_url}" alt="${game.title}" class="game-image">
                            <div class="info">
                                <h3 class="game title">${game.title}</h3>
                                <p class="tag genre-tag">${game.genre}</p>
                                <p class="game description">${game.description}</p>
                                <p class="release-date">${game.release_year}</p>
                            </div>
                        </a>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading games:', error);
            }
        }

        // Initial load
        loadGames();

        // Event listeners
        document.getElementById('library-search-input').addEventListener('input', (e) => {
            const search = e.target.value;
            const genre = document.getElementById('genres').value;
            const platform = document.getElementById('platforms').value;
            loadGames(search, genre, platform);
        });

        document.getElementById('genres').addEventListener('change', (e) => {
            const search = document.getElementById('library-search-input').value;
            const genre = e.target.value;
            const platform = document.getElementById('platforms').value;
            loadGames(search, genre, platform);
        });

        document.getElementById('platforms').addEventListener('change', (e) => {
            const search = document.getElementById('library-search-input').value;
            const genre = document.getElementById('genres').value;
            const platform = e.target.value;
            loadGames(search, genre, platform);
        });

        function updateAuthButton(loggedIn) {
            const authDiv = document.getElementById('auth-button');
            if (loggedIn) {
                authDiv.innerHTML = '<button id="logout-btn" class="btn nav-btn">Log Out</button>';
                document.getElementById('logout-btn').addEventListener('click', async () => {
                    try {
                        await fetch('/auth/logout', { method: 'POST' });
                        location.reload();
                    } catch (error) {
                        console.error('Logout error:', error);
                    }
                });
            } else {
                authDiv.innerHTML = '<a href="signin.html"> <button id="signin-btn" class="btn nav-btn" > Sign In </button> </a>';
            }
        }

        // Check login status on page load
        fetch('/auth/status').then(res => res.json()).then(status => updateAuthButton(status.loggedIn)).catch(console.error);
    </script>

</body>
</html>
