<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="./stylesheets/stylesheet.css">
</head>
<body>
    <div class="navbar">
        <a href="./index.html">
            <img src="./assets/logowords2.png" alt="Player One Logo" class="logo">
        </a>
        <div class="navbar-links">
            <a href="./index.html"> <button id="home-btn" class="btn nav-btn" > Home </button> </a>
            <a href="./games-library.html"> <button id="library-btn" class="btn nav-btn" > Library </button> </a>
            <form class="search-form"> 
                <input type="text" id="search-input" placeholder="Search games...">
                <button id="search-btn" class="btn nav-btn" > Search </button> 
            </form>
            <div id="auth-button">
                <a href="./signin.html"> <button id="signin-btn" class="btn nav-btn" > Sign In </button> </a>
            </div>
        </div>
    </div> 

    <div class="container">
        <div class="sign-up">
            <img src="./assets/transparent-solo-logo.png" alt="small logo for signup" class="small-logo">
            <h2 class="title">Sign Up</h2>
            <p class="text">Access the Game Wiki Dashboard</p>
            <form class="form">
                <p class="email label">Email</p>
                <input type="email" id="email-input" class="input" placeholder="Email...">
                <p class="password label">Password</p>
                <input type="password" id="password-input" class="input" placeholder="Password...">
                <input type="password" id="confirm-password-input" class="input" placeholder="Confirm Password...">
                <button class="btn register-btn">Register</button>
            </form>
        </div>
    </div>

    <script>
        document.querySelector('.register-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            const confirmPassword = document.getElementById('confirm-password-input').value;

            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            try {
                const response = await fetch('/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, confirmPassword })
                });
                const data = await response.json();
                if (response.ok) {
                    alert('Registered successfully! Please sign in.');
                    window.location.href = '/signin.html';
                } else {
                    alert(data.error);
                }
            } catch (error) {
                alert('An error occurred');
            }
        });

        function updateAuthButton(loggedIn) {
            const authDiv = document.getElementById('auth-button');
            if (loggedIn) {
                authDiv.innerHTML = '<button id="logout-btn" class="btn nav-btn">Log Out</button>';
                document.getElementById('logout-btn').addEventListener('click', async () => {
                    try {
                        await fetch('/auth/logout', { method: 'POST' });
                        location.reload();
                    } catch (error) {
                        console.error('Logout error:', error);
                    }
                });
            } else {
                authDiv.innerHTML = '<a href="./signin.html"> <button id="signin-btn" class="btn nav-btn" > Sign In </button> </a>';
            }
        }

        // Check login status on page load
        fetch('/auth/status').then(res => res.json()).then(status => updateAuthButton(status.loggedIn)).catch(console.error);
    </script>

</body>
</html>
